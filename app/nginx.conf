# Redirige el tráfico de HTTP a HTTPS
server {
    listen 80;
    server_name _;

    return 301 https://$host$request_uri;
}

# Bloque principal para HTTPS
server {
    listen 443 ssl;
    server_name _;

    # Certificados montados desde el volumen
    ssl_certificate /certs/server.crt;
    ssl_certificate_key /certs/server.key;

    # Opciones de seguridad recomendadas
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Servir archivos estáticos de Django directamente desde Nginx
    location /static/ {
        alias /usr/share/nginx/html/static/;
    }

    # Proxy hacia el servidor Gunicorn de la app Django
    location / {
        proxy_pass http://web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
